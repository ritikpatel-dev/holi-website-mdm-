<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi - Festival of Colors</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(45deg, #ff4e50, #fc913a, #f9d423, #24c6dc, #514a9d);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{
    text-align:center;
    color:white;
}

h1{
    font-size:60px;
    text-shadow:0 0 20px yellow, 0 0 40px red;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #fff, 0 0 20px #ff0;}
    to{ text-shadow:0 0 20px #ff0, 0 0 40px #f0f;}
}

p{
    margin-top:15px;
    font-size:22px;
}

button{
    margin-top:30px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    background:white;
    color:#ff4e50;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#ff4e50;
    color:white;
    transform:scale(1.1);
}

.color{
    position:absolute;
    width:20px;
    height:20px;
    border-radius:50%;
    pointer-events:none;
    animation: fall 4s linear forwards;
}

@keyframes fall{
    0%{ transform:translateY(0) scale(1); opacity:1;}
    100%{ transform:translateY(100vh) scale(0.3); opacity:0;}
}

.footer{
    position:absolute;
    bottom:20px;
    font-size:16px;
    color:white;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌈 Happy Holi 🌈</h1>
    <p>Celebrate the Joy of Colors and Happiness!</p>
    <button onclick="burstColors()">Throw Colors 🎨</button>
</div>

<div class="footer">
    Made with ❤️ for Holi Festival
</div>

<script>
function burstColors(){
    for(let i=0; i<60; i++){
        let color = document.createElement("div");
        color.classList.add("color");

        let colors = ["#ff4e50","#fc913a","#f9d423","#24c6dc","#514a9d","#ff00cc","#00ffcc"];
        color.style.background = colors[Math.floor(Math.random()*colors.length)];

        color.style.left = Math.random()*window.innerWidth + "px";
        color.style.top = "0px";

        color.style.width = Math.random()*20 + 10 + "px";
        color.style.height = color.style.width;

        document.body.appendChild(color);

        setTimeout(()=>{ color.remove(); },4000);
    }
}
</script>

</body>
</html>
