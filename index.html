<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi - Festival of Colors</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(45deg, #ff4e50, #fc913a, #f9d423, #24c6dc, #514a9d);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

/* Background animation */
@keyframes gradientBG {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{
    text-align:center;
    color:white;
    z-index:2;
}

h1{
    font-size:60px;
    text-shadow:0 0 20px yellow, 0 0 40px red;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #fff, 0 0 20px #ff0;}
    to{ text-shadow:0 0 20px #ff0, 0 0 40px #f0f;}
}

p{
    margin-top:15px;
    font-size:22px;
}

button{
    margin-top:30px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    background:white;
    color:#ff4e50;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#ff4e50;
    color:white;
    transform:scale(1.1);
}

/* Image + Greeting Section */
.holi-special{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    text-align:center;
    opacity:0;
    transition:0.8s ease;
    z-index:3;
}

.holi-special.show{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
}

.holi-special img{
    width:260px;
    border-radius:20px;
    box-shadow:0 0 40px white;
    margin-bottom:20px;
}

.special-text{
    font-size:42px;
    font-weight:bold;
    color:white;
    text-shadow:0 0 20px #fff, 0 0 40px #ff00cc;
    animation: glow 2s infinite alternate;
}

.footer{
    position:absolute;
    bottom:20px;
    font-size:16px;
    color:white;
}

/* Powder particle */
.powder{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌈 Happy Holi 🌈</h1>
    <p>Celebrate the Joy of Colors and Happiness!</p>
    <button onclick="burstColors()">Throw Colors 🎨</button>
</div>

<!-- Hidden Image + Text -->
<div class="holi-special" id="special">
    <img src="lezhil.png" alt="Holi Special Image">
    <div class="special-text">Happy Holi MDM 🎉</div>
</div>

<div class="footer">
    Made with ❤️ for Holi Festival
</div>

<script>

function burstColors(){

    // Create blasts from multiple directions
    createBlast(window.innerWidth/2, window.innerHeight/2); // Center
    createBlast(0, window.innerHeight/2); // Left
    createBlast(window.innerWidth/2, 0); // Top

    // Show Image + Greeting
    document.getElementById("special").classList.add("show");
}

function createBlast(originX, originY){

    let colors = ["#ff4e50","#fc913a","#f9d423","#24c6dc","#514a9d","#ff00cc","#00ffcc"];

    for(let i=0; i<150; i++){

        let powder = document.createElement("div");
        powder.classList.add("powder");

        powder.style.background = colors[Math.floor(Math.random()*colors.length)];
        powder.style.left = originX + "px";
        powder.style.top = originY + "px";

        document.body.appendChild(powder);

        let angle = Math.random()*2*Math.PI;
        let distance = Math.random()*500 + 100;

        let x = Math.cos(angle)*distance;
        let y = Math.sin(angle)*distance;

        powder.animate([
            { transform: "translate(0,0) scale(1)", opacity:1 },
            { transform: `translate(${x}px,${y}px) scale(2)`, opacity:0 }
        ],{
            duration: 2200,
            easing: "ease-out"
        });

        setTimeout(()=> powder.remove(),2200);
    }
}

</script>

</body>
</html>
